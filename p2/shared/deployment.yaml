apiVersion: apps/v1
kind: Deployment
metadata:
  name: app1-com
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app1.com
  template:
    metadata:
      labels:
        app: app1.com
    spec:
      containers:
        - name: app1
          image: nginx:stable
          ports:
            - containerPort: 80
          volumeMounts:
            - name: app1-page-volume
              mountPath: /usr/share/nginx/html/index.html
              subPath: index.html
      volumes:
        - name: app1-page-volume
          configMap:
            name: app1-page

---
apiVersion: v1
kind: Service
metadata:
  name: app1-svc
spec:
  type: ClusterIP
  selector:
    app: app1.com
  ports:
    - port: 80
      targetPort: 80

---
apiVersion: apps/v1
kind: Deployment
metadata:
