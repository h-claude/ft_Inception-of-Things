apiVersion: apps/v1
kind: Deployment
metadata:
  name: mon-nginx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mon-nginx
  template:
    metadata:
      labels:
        app: mon-nginx
    spec:
      containers:
        - name: nginx
          image: nginx
          ports:
            - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: mon-nginx-svc
spec:
  type: NodePort
  selector:
    app: mon-nginx
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080