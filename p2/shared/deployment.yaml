---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app3-com
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app3.com
  template:
    metadata:
      labels:
        app: app3.com
    spec:
      containers:
        - name: app3
          image: nginx:stable
          ports:
            - containerPort: 80
          volumeMounts:
            - name: app3-page-volume
              mountPath: /usr/share/nginx/html/index.html
              subPath: index.html
      volumes:
        - name: app3-page-volume
